<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book — Bliss</title>
<meta name="description" content="Bliss booking flow prototype.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Archivo:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --peri:#8DA3D4; --peri-10:rgba(141,163,212,.10); --peri-18:rgba(141,163,212,.20);
    --ink:#37324B; --ink-soft:#454060; --action:#6583B9; --action-dark:#54709F;
    --bg:#F5F6FB; --card:#FFFFFE; --muted:#6E696E; --lgrey:#AAAAB4;
    --apricot:#E8933A; --ok:#2E7D4F; --err:#B3423A;
    --hairline:#E7E9F2;
    --serif:"Fraunces","Noto Serif TC",Georgia,serif;
    --sans:"Archivo","Noto Sans TC","Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0}
  html{background:var(--bg)}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.5;font-size:15px}
  a{color:var(--action)}
  :focus-visible{outline:3px solid var(--action);outline-offset:2px;border-radius:4px}
  button{font-family:var(--sans)}

  /* header */
  .bk-head{background:var(--card);border-bottom:1px solid var(--hairline)}
  .bk-head .inner{max-width:680px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .bk-head img{height:24px;display:block}
  .bk-head .vend{text-align:center;min-width:0}
  .bk-head .vend b{display:block;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bk-head .vend span{font-size:11.5px;color:var(--muted)}
  .bk-head .right{display:flex;gap:8px;align-items:center}
  .x-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--hairline);background:var(--card);cursor:pointer;font-size:14px;color:var(--ink);line-height:1;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
  .x-btn:hover{border-color:var(--ink)}
  .lang-toggle{background:transparent;border:1px solid var(--hairline);border-radius:999px;padding:5px 11px;font:600 12px var(--sans);color:var(--ink);cursor:pointer}

  /* progress */
  .prog{max-width:680px;margin:0 auto;padding:14px 20px 0}
  .prog .label{font-size:12px;color:var(--muted);font-weight:600}
  .prog .track{height:4px;border-radius:999px;background:var(--peri-18);margin-top:6px;overflow:hidden}
  .prog .fill{height:100%;border-radius:999px;background:var(--peri);transition:width .25s ease-out;width:0}

  /* crumb trail (desktop) */
  .crumb-row{display:none}
  /* summary card (desktop) */
  .sum-card{display:none;background:var(--card);border:1px solid var(--hairline);border-radius:16px;padding:20px;box-shadow:0 4px 24px rgba(55,50,75,.06)}
  .sc-vend{display:flex;gap:12px;align-items:center;padding-bottom:14px;border-bottom:1px solid var(--hairline)}
  .sc-vend .ph{width:54px;height:54px;border-radius:12px;flex:none;padding:4px}
  .sc-vend .ph small{display:none}
  .sc-vend b{display:block;font-size:14.5px;line-height:1.3}
  .sc-vend .r{font-size:12.5px;font-weight:700;display:block;margin-top:2px}
  .sc-vend .r .star{color:var(--apricot)}
  .sc-vend .a{font-size:12px;color:var(--muted)}
  .sc-when{padding:12px 0;border-bottom:1px solid var(--hairline);font-size:13.5px;display:none}
  .sc-when.show{display:block}
  .sc-when .kv{display:flex;gap:8px;padding:2px 0}
  .sc-when .ic{width:18px;text-align:center;opacity:.7}
  .sc-lines{padding:12px 0}
  .sc-line{padding:6px 0;font-size:13.5px}
  .sc-line .t{display:flex;justify-content:space-between;gap:10px}
  .sc-line .t span:last-child{font-variant-numeric:tabular-nums;white-space:nowrap}
  .sc-line .w{font-size:12px;color:var(--muted)}
  .sc-empty{color:var(--muted);font-size:13px;padding:6px 0}
  .sc-tot{border-top:1px solid var(--hairline);padding-top:12px;font-size:13.5px}
  .sc-tot .line{display:flex;justify-content:space-between;padding:2px 0}
  .sc-tot .grand{font-weight:800;font-size:15px}
  .sum-card .btn{width:100%;margin-top:14px;padding:13px}
  /* waitlist */
  .waitlist{margin-top:12px;font-size:13px;color:var(--muted)}
  .waitlist button{background:none;border:0;color:var(--action);font:600 13px var(--sans);cursor:pointer;text-decoration:underline;padding:0}
  .waitlist .ok{color:var(--ok);font-weight:600}
  /* policy card */
  .policy h3{font-size:14px;font-weight:800;margin-bottom:6px}
  .policy p{font-size:13px;color:var(--ink-soft)}

  /* panel */
  .bk-grid{margin:0 auto}
  .panel{max-width:680px;margin:14px auto 90px;padding:0 20px}

  @media (min-width:960px){
    .bk-head{background:transparent;border-bottom:0}
    .bk-head .inner{max-width:1100px}
    .bk-head .vend{visibility:hidden}
    .prog{display:none}
    .crumb-row{display:flex;align-items:center;gap:16px;max-width:1100px;margin:8px auto 0;padding:0 20px}
    .crumb-row #backFloat{display:none}
    .crumbs{display:flex;gap:8px;font-size:13.5px;flex-wrap:wrap;align-items:center}
    .crumbs button{background:none;border:0;font:600 13.5px var(--sans);color:var(--lgrey);padding:0;cursor:default}
    .crumbs button.done{color:var(--muted);cursor:pointer}
    .crumbs button.done:hover{color:var(--action)}
    .crumbs button.cur{color:var(--ink);font-weight:800}
    .crumbs .sep{color:var(--lgrey);font-size:11px}
    .bk-grid{display:grid;grid-template-columns:1fr 370px;gap:44px;max-width:1100px;margin:6px auto 60px;padding:0 20px;align-items:start}
    .bk-grid.no-sum{grid-template-columns:1fr;max-width:760px}
    .bk-grid.no-sum .sum-card{display:none}
    .panel{max-width:none;margin:0;padding:0}
    .bar{display:none}
    .sum-card{display:block;position:sticky;top:20px}
    #svcSummary{display:none}
  }
  .screen{display:none}
  .screen.on{display:block;animation:rise .3s ease-out}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .screen h1{font-size:21px;font-weight:800;letter-spacing:-.015em;margin-bottom:4px}
  .screen .sub{font-size:13.5px;color:var(--muted);margin-bottom:16px}
  .card-box{background:var(--card);border:1px solid var(--hairline);border-radius:14px;padding:16px}
  .card-box + .card-box{margin-top:12px}

  /* chips / tabs */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .tab{border:1px solid var(--hairline);cursor:pointer;border-radius:999px;padding:7px 15px;font:600 13px var(--sans);background:var(--card);color:var(--ink)}
  .tab:hover{border-color:var(--ink)}
  .tab.active{background:var(--ink);border-color:var(--ink);color:#FEFEFF}
  .big-tabs{display:flex;background:var(--peri-18);border-radius:999px;padding:4px;margin-bottom:16px}
  .big-tab{flex:1;border:0;border-radius:999px;padding:9px;font:700 13.5px var(--sans);background:transparent;color:var(--ink-soft);cursor:pointer}
  .big-tab.active{background:var(--card);box-shadow:0 1px 4px rgba(55,50,75,.12)}

  /* guests */
  .guest-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .guest-row .lbl{font-size:13.5px;font-weight:700}
  .stepper{display:flex;align-items:center;gap:12px}
  .stepper button{width:30px;height:30px;border-radius:50%;border:1px solid var(--hairline);background:var(--card);font-size:15px;cursor:pointer;color:var(--ink)}
  .stepper button:disabled{opacity:.35;cursor:default}
  .stepper b{min-width:16px;text-align:center;font-variant-numeric:tabular-nums}
  .guest-pills{display:flex;gap:8px;margin-bottom:12px}
  .guest-pill{border:1px solid var(--hairline);border-radius:999px;padding:7px 16px;font:600 13px var(--sans);background:var(--card);cursor:pointer;color:var(--ink)}
  .guest-pill.active{background:var(--peri);border-color:var(--peri);color:#FEFEFF}

  /* service rows */
  .svc-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--hairline)}
  .svc-row:last-child{border-bottom:0}
  .svc-row.hide{display:none}
  .svc-row h3{font-size:14.5px;font-weight:700}
  .svc-row .m{font-size:12.5px;color:var(--muted)}
  .svc-row .p{font-size:13.5px;font-weight:700;white-space:nowrap}
  .add-btn{border:1.5px solid var(--ink);background:transparent;color:var(--ink);border-radius:999px;padding:6px 16px;font:700 12.5px var(--sans);cursor:pointer;white-space:nowrap}
  .add-btn.on{background:var(--ink);color:#FEFEFF}

  /* summary */
  .summary{background:var(--peri-10);border:1px solid var(--peri-18);border-radius:14px;padding:14px 16px;margin-top:14px;font-size:13.5px}
  .summary h4{font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
  .summary .line{display:flex;justify-content:space-between;padding:3px 0}
  .summary .line span:last-child{font-variant-numeric:tabular-nums}
  .summary .tot{border-top:1px solid var(--peri-18);margin-top:8px;padding-top:8px;font-weight:800}
  .warn{margin-top:10px;font-size:12.5px;color:var(--err);display:none}
  .warn.show{display:block}

  /* date strip */
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
  .day{border:1px solid var(--hairline);border-radius:12px;padding:9px 2px;text-align:center;background:var(--card);cursor:pointer}
  .day .dw{font-size:10.5px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
  .day .dn{font-size:16px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
  .day.active{border-color:var(--ink);background:var(--ink);color:#FEFEFF}
  .day.active .dw{color:rgba(254,254,255,.75)}

  /* slots */
  .slots{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .slot{border:1px solid var(--hairline);border-radius:10px;padding:10px 4px;text-align:center;font:600 13px var(--sans);background:var(--card);cursor:pointer;color:var(--ink);font-variant-numeric:tabular-nums}
  .slot:hover{border-color:var(--ink)}
  .slot.active{background:var(--action);border-color:var(--action);color:#FEFEFF}
  .slot:disabled{color:var(--lgrey);background:var(--bg);cursor:default;border-color:var(--hairline)}
  .staff-pref{margin-top:16px}
  .staff-pref label{font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .staff-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

  /* class list */
  .cls{display:flex;gap:12px;align-items:center;padding:13px 0;border-bottom:1px solid var(--hairline);cursor:pointer}
  .cls:last-child{border-bottom:0}
  .cls:hover h3{color:var(--action)}
  .cls .av{width:42px;height:42px;border-radius:50%;background:var(--peri-18);color:var(--ink-soft);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex:none}
  .cls .info{flex:1;min-width:0}
  .cls h3{font-size:14.5px;font-weight:700}
  .cls .m{font-size:12.5px;color:var(--muted)}
  .cls .spots{font-size:11.5px;font-weight:700;color:var(--ok);white-space:nowrap}
  .cls .spots.low{color:var(--apricot)}
  .coach-first{margin-top:14px;text-align:center}
  .coach-first button{background:none;border:0;color:var(--action);font:600 13.5px var(--sans);cursor:pointer;text-decoration:underline}

  /* class detail / coach */
  .detail-top{display:flex;gap:14px;align-items:center;margin-bottom:14px}
  .detail-top .av{width:54px;height:54px;border-radius:50%;background:var(--peri-18);color:var(--ink-soft);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800}
  .detail-top b{display:block;font-size:15px}
  .detail-top span{font-size:12.5px;color:var(--muted)}
  .kv{display:flex;gap:8px;font-size:13.5px;padding:5px 0}
  .kv .ic{width:20px;text-align:center;opacity:.7}
  .desc{font-size:13.5px;color:var(--ink-soft);margin-top:10px}
  .coach-card{display:flex;gap:12px;align-items:center;padding:13px 0;border-bottom:1px solid var(--hairline);cursor:pointer}
  .coach-card:last-child{border-bottom:0}
  .coach-card .av{width:46px;height:46px;border-radius:50%;background:var(--peri-18);color:var(--ink-soft);display:flex;align-items:center;justify-content:center;font-weight:800}
  .coach-card h3{font-size:14.5px;font-weight:700}
  .coach-card .m{font-size:12.5px;color:var(--muted)}
  .coach-card .r{font-size:12.5px;font-weight:700;white-space:nowrap}
  .coach-card .r .star{color:var(--apricot)}

  /* form */
  .frm label{display:block;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;margin:14px 0 5px}
  .frm input[type=text],.frm input[type=email],.frm input[type=tel],.frm textarea{width:100%;border:1px solid var(--hairline);border-radius:10px;padding:11px 13px;font:14px var(--sans);color:var(--ink);background:var(--card)}
  .frm textarea{min-height:70px;resize:vertical}
  .frm .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .frm input.bad{border-color:var(--err)}
  .checks{margin-top:16px}
  /* .frm label sets block/uppercase for field labels; outrank it for checkbox rows */
  .frm label.check,.check{display:flex;gap:12px;align-items:center;padding:8px 0;margin:0;
    font-size:13.5px;font-weight:400;letter-spacing:normal;text-transform:none;color:var(--ink)}
  .check input{width:17px;height:17px;margin:0;flex:none;accent-color:var(--action)}
  .check .hint{display:block;font-size:11.5px;color:var(--muted);text-transform:none;letter-spacing:normal;font-weight:400}
  .login-hint{font-size:13px;color:var(--muted);margin-bottom:14px}

  /* confirm */
  .promo-row{display:flex;gap:8px;margin-top:12px}
  .promo-row input{flex:1;border:1px solid var(--hairline);border-radius:10px;padding:10px 13px;font:14px var(--sans);text-transform:uppercase}
  .promo-row button{border:0;background:var(--ink);color:#FEFEFF;border-radius:999px;padding:0 18px;font:700 13px var(--sans);cursor:pointer}
  .promo-ok{display:none;margin-top:10px;background:#EDF6EF;border-radius:10px;padding:10px 13px;font-size:13px;color:var(--ok);justify-content:space-between}
  .promo-ok.show{display:flex}
  .promo-ok button{background:none;border:0;color:var(--muted);cursor:pointer;font-size:12.5px}
  .promo-err{display:none;margin-top:8px;font-size:12.5px;color:var(--err)}
  .promo-err.show{display:block}

  /* success */
  .success-wrap{text-align:center;padding-top:8px}
  .success-wrap .mark{width:74px;height:74px;margin:0 auto 14px;background:var(--peri);border-radius:100% 100% 0 100%;display:flex;align-items:center;justify-content:center;color:#FEFEFF;font-size:30px;transform:rotate(45deg)}
  .success-wrap .mark span{transform:rotate(-45deg)}
  .success-wrap h1{font-family:var(--serif);font-weight:600;font-size:26px}
  .recap{text-align:left;margin-top:18px}
  .recap .kv b{font-weight:700}
  .succ-actions{display:flex;gap:10px;margin-top:16px}
  .succ-actions .btn{flex:1}

  /* bookings list */
  .bkg{padding:14px 0;border-bottom:1px solid var(--hairline)}
  .bkg:last-child{border-bottom:0}
  .bkg .top{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
  .bkg h3{font-size:14.5px;font-weight:700}
  .bkg .st{font-size:11.5px;font-weight:700;border-radius:999px;padding:2px 10px}
  .st.up{background:var(--peri-10);color:var(--action)}
  .st.done{background:var(--bg);color:var(--muted)}
  .st.off{background:#F9ECEA;color:var(--err)}
  .bkg .m{font-size:12.5px;color:var(--muted);margin-top:3px}
  .bkg .row-actions{margin-top:9px;display:flex;gap:10px;align-items:center}
  .cancel-btn{border:1.5px solid var(--hairline);background:transparent;border-radius:999px;padding:6px 15px;font:700 12.5px var(--sans);cursor:pointer;color:var(--ink)}
  .cancel-btn:hover{border-color:var(--err);color:var(--err)}
  .cancel-btn:disabled{color:var(--lgrey);cursor:default;border-color:var(--hairline)}
  .rule-note{font-size:11.5px;color:var(--muted)}

  /* footer bar */
  .bar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--hairline);z-index:40}
  .bar .inner{max-width:680px;margin:0 auto;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px}
  .btn{display:inline-flex;align-items:center;justify-content:center;border:0;cursor:pointer;border-radius:999px;padding:12px 26px;font:700 14.5px var(--sans);text-decoration:none;transition:background .15s ease-out}
  .btn-primary{background:var(--ink);color:#FEFEFF}
  .btn-primary:hover{background:var(--action)}
  .btn-primary:disabled{background:var(--lgrey);cursor:default}
  .btn-ghost{background:transparent;border:1.5px solid var(--hairline);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--ink)}
  .bar .total{font-size:13px;color:var(--muted)}
  .bar .total b{display:block;font-size:16px;color:var(--ink);font-variant-numeric:tabular-nums}

  /* dialog */
  .modal-wrap{position:fixed;inset:0;background:rgba(55,50,75,.45);display:none;align-items:center;justify-content:center;z-index:90;padding:24px}
  .modal-wrap.show{display:flex}
  .modal{background:var(--card);border-radius:16px;padding:26px;max-width:380px;width:100%;text-align:center}
  .modal h3{font-size:17px;font-weight:800}
  .modal p{font-size:13.5px;color:var(--muted);margin-top:8px}
  .modal .acts{display:flex;gap:10px;margin-top:18px}
  .modal .acts .btn{flex:1;padding:11px}

  .demo-links{max-width:680px;margin:0 auto;padding:10px 20px 24px;font-size:12px;color:var(--muted);text-align:center}
  .demo-links a{margin:0 5px}

  @media (max-width:560px){
    .slots{grid-template-columns:repeat(3,1fr)}
    .frm .grid2{grid-template-columns:1fr}
    .panel{margin-bottom:96px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }
</style>
</head>
<body>

<header class="bk-head">
  <div class="inner">
    <a href="index.html" aria-label="Bliss home"><img src="assets/bliss-horizontal-periwinkle.svg" alt="bliss"></a>
    <div class="vend"><b id="vendName"></b><span id="vendMeta"></span></div>
    <div class="right">
      <button class="lang-toggle" id="langToggle" aria-label="Switch language">繁</button>
      <a class="x-btn" href="vendor.html" aria-label="Close booking">✕</a>
    </div>
  </div>
</header>

<div class="prog" id="prog">
  <div class="label"><span id="progLabel"></span></div>
  <div class="track"><div class="fill" id="progFill"></div></div>
</div>

<div class="crumb-row" id="crumbRow">
  <button class="x-btn" id="backFloat" aria-label="Back">←</button>
  <nav class="crumbs" id="crumbs" aria-label="Booking steps"></nav>
</div>

<div class="bk-grid" id="bkGrid">
<main class="panel">

  <!-- S1 service picker -->
  <section class="screen" id="s1">
    <h1 data-i18n="s1_h"></h1>
    <p class="sub" data-i18n="s1_sub"></p>
    <div class="card-box">
      <div class="guest-row"><span class="lbl" data-i18n="guests"></span>
        <div class="stepper"><button id="gMinus" aria-label="Fewer guests">−</button><b id="gCount">1</b><button id="gPlus" aria-label="More guests">＋</button></div>
      </div>
      <div class="guest-pills" id="guestPills"></div>
      <div class="tabs" id="svcTabs"></div>
      <div id="svcList"></div>
    </div>
    <div class="summary" id="svcSummary"></div>
    <p class="warn" id="svcWarn" data-i18n="s1_warn"></p>
  </section>

  <!-- S2 date & time (service) / hybrid host -->
  <section class="screen" id="s2">
    <h1 data-i18n="s2_h"></h1>
    <p class="sub" id="s2sub"></p>
    <div class="big-tabs" id="hybridTabs" style="display:none">
      <button class="big-tab active" data-htab="class" data-i18n="tab_class"></button>
      <button class="big-tab" data-htab="service" data-i18n="tab_service"></button>
    </div>
    <div class="days" id="dayStrip"></div>
    <div id="s2service">
      <div class="card-box"><div class="slots" id="slotGrid"></div></div>

  return mx;
}
function fmtDur(m){
  const h=Math.floor(m/60), r=m%60;
  if(lang==='en') return (h?h+' '+T().hr_u+(r?' ':''):'')+(r?r+' '+T().min_u:'')||'0 '+T().min_u;

}
function endTime(start,m){
  const [h,mi]=start.split(':').map(Number);
  const t=h*60+mi+m;
  return String(Math.floor(t/60)%24).padStart(2,'0')+':'+String(t%60).padStart(2,'0');
}

  if(id==='s2') return (mode==='service'||S.hybridTab==='service') && seq()[0]==='s1' ? 1 : 0;

  if(prev) show(prev,false); else location.href='vendor.html';
}

}

  $('prog').style.visibility='visible';
  $('progLabel').textContent = T().steps[st] + ' · ' + (st+1) + '/4';
  $('progFill').style.width = ((st+1)/4*100)+'%';
}
function renderGuests(){
  $('gCount').textContent=S.guests;
  $('gMinus').disabled = S.guests<=1;
  $('gPlus').disabled = S.guests>=2;
  const gp=$('guestPills'); gp.innerHTML='';
  if(S.guests>1){
    for(let i=0;i<S.guests;i++){
      const b=document.createElement('button');
      b.type='button'; b.className='guest-pill'+(i===S.activeGuest?' active':'');
      b.textContent=`${T().guest} ${i+1}`;
      b.onclick=()=>{S.activeGuest=i;renderGuests();renderSvcList();};
      gp.appendChild(b);
    }

}
let svcCat='all';
function renderSvcTabs(){
  const el=$('svcTabs'); el.innerHTML='';
  const cats=[{id:'all',en:'All',zh:'全部'},...vendor.cats];
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.type='button'; b.className='tab'+(svcCat===c.id?' active':'');
    b.textContent=c[lang];
    b.onclick=()=>{svcCat=c.id;renderSvcTabs();renderSvcList();};
    el.appendChild(b);
  });
}
function renderSvcList(){
  const el=$('svcList'); el.innerHTML='';
  vendor.services.forEach(s=>{
    if(svcCat!=='all'&&s.cat!==svcCat) return;
    const on=S.picks[S.activeGuest].includes(s.id);
    const row=document.createElement('div'); row.className='svc-row';
    row.innerHTML=`<div><h3>${s[lang]}</h3><p class="m">${s.min} ${T().min}</p></div>
      <div style="display:flex;align-items:center;gap:12px"><span class="p">${money(s.price)}</span>
      <button type="button" class="add-btn${on?' on':''}">${on?'✓':'＋'}</button></div>`;
    row.querySelector('.add-btn').onclick=()=>{
      const arr=S.picks[S.activeGuest];
      const i=arr.indexOf(s.id);
      if(i>=0) arr.splice(i,1); else arr.push(s.id);
      renderSvcList(); renderSummary(); renderBar();
      $('svcWarn').classList.remove('show');
    };
    el.appendChild(row);
  });
  renderSummary();
}
function renderSummary(){
  const el=$('svcSummary');
  let html=`<h4>${T().summary}</h4>`; let tot=0; let any=false;
  for(let g=0; g<S.guests; g++){
    if(S.guests>1) html+=`<div class="line" style="font-weight:700"><span>${T().guest} ${g+1}</span><span></span></div>`;
    S.picks[g].forEach(id=>{
      const s=svcById(id); tot+=s.price; any=true;
      html+=`<div class="line"><span>${s[lang]}</span><span>${money(s.price)}</span></div>`;
    });
  }
  if(!any) html+=`<div class="line"><span style="color:var(--muted)">${T().none_chosen}</span><span></span></div>`;
  html+=`<div class="line tot"><span>${T().total}</span><span>${money(tot)}</span></div>`;
  el.innerHTML=html;
}

    b.innerHTML=`<div class="dw">${T().days_s[d.getDay()]}</div><div class="dn">${d.getDate()}</div>`;
    b.onclick=()=>onPick(i);
    el.appendChild(b);

function priceLines(){
  const lines=[];
  if(S.cls){
    const c=clsById(S.cls.id);
    lines.push({t:`${c[lang]} · ${coachById(c.coach).n}`, p:c.price});
  } else {
    for(let g=0; g<S.guests; g++){
      S.picks[g].forEach(id=>{
        const s=svcById(id);
        lines.push({t:(S.guests>1?`${T().guest} ${g+1} · `:'')+s[lang], p:s.price});
      });
    }
  }
  return lines;
}
function totals(){
  const sub=priceLines().reduce((a,l)=>a+l.p,0);
  const disc=S.promo? Math.min(50,sub):0;
  return {sub, disc, tot: sub-disc};
}

/* ================= bar / validation ================= */
function canNext(){
  switch(S.screen){
    case 's1': { for(let g=0; g<S.guests; g++) if(!S.picks[g].length) return false; return true; }
    case 's2': {
      const clsMode = (mode==='class')||(mode==='hybrid'&&S.hybridTab==='class');
      return clsMode? false : !!S.time;   /* class mode advances by tapping a class */
    }
    case 's4': return true;
    case 's5': return !!S.coachTime;
    case 's6': return true;               /* validated on click */
    case 's7': return true;
    default: return true;
  }
}

  return T().next;
}

function alignSumCard(){
  /* Desktop: drop the summary card so its top meets the screen's first
     content block, leaving the heading + subtitle as a header above. */
  const card=$('sumCard'), grid=$('bkGrid');
  if(!window.matchMedia('(min-width:960px)').matches || grid.classList.contains('no-sum')){
    card.style.marginTop=''; return;
  }
  const screen=document.querySelector('.screen.on');
  if(!screen){ card.style.marginTop=''; return; }
  let target=null;
  for(const el of screen.children){
    if(el.matches('h1, .sub, .login-hint')) continue;      /* header text */
    if(getComputedStyle(el).display==='none') continue;     /* hidden variant block */
    target=el; break;
  }
  if(!target){ card.style.marginTop=''; return; }
  /* Sum offsetTop up the chain for both, so the measurement is immune to the
     entry-animation transform (which reparents offsetTop) and to any offsetParent flip. */
  const absTop=el=>{let y=0;while(el){y+=el.offsetTop;el=el.offsetParent;}return y;};
  const off = absTop(target) - absTop(grid);
  card.style.marginTop = (off>0?off:0) + 'px';
}
function crumbTarget(i){
  if(i===0) return seq()[0];
  if(i===1) return 's2';
  if(i===2) return 's6';

    const el=$(id); const bad=!el.value.trim();
    el.classList.toggle('bad',bad); if(bad) ok=false;

$('nextBtn').onclick=()=>{
  const id=S.screen;
  if(id==='s1'){ if(!canNext()){$('svcWarn').classList.add('show');return;} show(S.time?'s6':'s2'); return; }
  if(id==='s2'){
    const anyPicks = S.picks.slice(0,S.guests).every(p=>p.length);
    show(anyPicks ? 's6' : 's1');   /* hybrid time-first path detours via service picker */
    return;
  }
  if(id==='s4'){ show('s6'); return; }
  if(id==='s5'){ show('s6'); return; }
  if(id==='s6'){ if(!validateS6()) return; show('s7'); return; }
  if(id==='s7'){
    const start=S.cls?S.cls.time:S.time;
    const at=dayDate(S.day); const [sh,sm]=start.split(':').map(Number); at.setHours(sh,sm,0,0);
    BOOKINGS.unshift({vendor:vendor.name,
      what_en:priceLines().map(l=>l.t).join(', '), what_zh:priceLines().map(l=>l.t).join('、'),
      offsetH:(at-Date.now())/3600e3, time:start, status:'up'});
    show('s8'); return;
  }
  if(id==='s8'||id==='s9'){ location.href='vendor.html'; }
};

$('calBtn').onclick=()=>{
  const d=dayDate(S.day);
  const [h,m]=(S.cls?S.cls.time:S.time).split(':');
  d.setHours(+h,+m,0,0);
  const end=new Date(d.getTime()+60*60000);
  const f=x=>x.toISOString().replace(/[-:]|\.\d{3}/g,'');
  const ics=`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${f(d)}\nDTEND:${f(end)}\nSUMMARY:${vendor.name}\nLOCATION:${vendor.addr_en}\nEND:VEVENT\nEND:VCALENDAR`;
  const a=document.createElement('a');
  a.href='data:text/calendar;charset=utf8,'+encodeURIComponent(ics);
  a.download='bliss-booking.ics'; a.click();
};

/* ================= i18n apply ================= */
function applyLang(){
  const dict=T();
  document.documentElement.lang = lang==='en'?'en':'zh-Hant';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(dict[k]) el.textContent=dict[k];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    const k=el.getAttribute('data-i18n-ph');
    if(dict[k]) el.setAttribute('placeholder',dict[k]);
  });
  $('langToggle').textContent = lang==='en'?'繁':'EN';
  render(S.screen); renderBar(); renderProg(); renderHead(); alignSumCard();
}
$('langToggle').onclick=()=>{lang=lang==='en'?'zh':'en';applyLang();};
addEventListener('resize', alignSumCard);

/* ================= boot ================= */
applyLang();
show(seq()[0], false);
/* Re-align the summary card once web fonts settle (heading height changes). */
addEventListener('load', alignSumCard);
if(document.fonts && document.fonts.ready) document.fonts.ready.then(alignSumCard);
</script>
